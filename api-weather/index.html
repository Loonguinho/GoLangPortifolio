<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Clima Go - Pro Dashboard</title>
    <style>
      :root {
        --primary: #00add8;
        --secondary: #6c757d;
        --bg: #f8f9fa;
        --card-bg: #ffffff;
        --day: #ff9800;
        --night: #3f51b5;
        --error: #f44336;
      }
      body {
        font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
        background-color: var(--bg);
        color: #333;
        margin: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        padding: 20px;
      }
      .container { width: 100%; max-width: 600px; }
      .tabs { display: flex; gap: 10px; margin-bottom: 20px; width: 100%; }
      .tab {
        flex: 1; padding: 12px; text-align: center; background: #ddd;
        border-radius: 8px; cursor: pointer; font-weight: bold; transition: 0.3s;
      }
      .tab.active { background: var(--primary); color: white; }
      .card {
        background: var(--card-bg); padding: 25px; border-radius: 12px;
        box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1); margin-bottom: 20px;
      }
      .hidden { display: none; }
      .input-group { margin-bottom: 15px; }
      .input-row { display: flex; gap: 10px; margin-top: 5px; }
      input { padding: 12px; border: 1px solid #ddd; border-radius: 8px; width: 100%; box-sizing: border-box; }
      button {
        background: var(--primary); color: white; border: none; padding: 12px 20px;
        border-radius: 8px; cursor: pointer; width: 100%; font-size: 16px; font-weight: bold;
      }
      button:hover { opacity: 0.9; }
      #map { height: 250px; border-radius: 8px; margin-top: 15px; }

      /* Unified Weather Result Card */
      .weather-result {
        border-left: 5px solid var(--primary);
        padding: 15px; margin-top: 15px; background: #f8f9fa;
        border-radius: 0 8px 8px 0; display: flex; justify-content: space-between; align-items: center;
      }
      .weather-result.error { border-left-color: var(--error); }
      .weather-info strong { font-size: 1.1rem; display: block; }
      .weather-info small { color: #666; font-size: 0.75rem; }
      .status-badge { padding: 4px 10px; border-radius: 20px; font-size: 0.8rem; font-weight: bold; color: white; }
      .status-day { background-color: var(--day); }
      .status-night { background-color: var(--night); }

      /* Modal Styles */
      .modal-overlay {
        position: fixed; top: 0; left: 0; width: 100%; height: 100%;
        background: rgba(0,0,0,0.5); display: flex; justify-content: center;
        align-items: center; z-index: 1000; visibility: hidden; opacity: 0; transition: 0.3s;
      }
      .modal-overlay.show { visibility: visible; opacity: 1; }
      .modal-content {
        background: white; width: 90%; max-width: 500px; max-height: 80vh;
        border-radius: 12px; padding: 25px; overflow-y: auto; position: relative;
      }
      .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; border-bottom: 1px solid #eee; padding-bottom: 10px; }
      .close-modal { font-size: 24px; cursor: pointer; color: #666; }

      .history-btn {
        position: fixed; bottom: 20px; right: 20px; background: #333;
        color: white; padding: 15px 25px; border-radius: 50px; cursor: pointer;
        box-shadow: 0 4px 10px rgba(0,0,0,0.3); z-index: 900;
      }

      .city-item { background: #f1f3f5; padding: 15px; border-radius: 8px; margin-bottom: 10px; }
    </style>
  </head>
  <body>
    <div class="container">
      <h1>🌤️ Weather Dashboard</h1>
      
      <div class="tabs">
        <div class="tab active" onclick="switchTab('single')">Smart Search</div>
        <div class="tab" onclick="switchTab('bulk')">Concurrent Bulk</div>
      </div>

      <div id="single-section" class="card">
        <h3>City Lookup</h3>
        <div class="input-group">
          <input type="text" id="s-name" placeholder="Enter City Name" />
          <div class="input-row"><input type="text" id="lat" placeholder="Lat (Opt)" /><input type="text" id="long" placeholder="Long (Opt)" /></div>
        </div>
        <button onclick="buscarClima()">Check Weather</button>
        <div id="resultado"></div>
        <div id="map"></div>
      </div>

      <div id="bulk-section" class="card hidden">
        <h3>Bulk Search</h3>
        <div id="bulk-list">
          <div class="city-item">
            <input type="text" class="b-name" placeholder="City Name" value="São Paulo">
            <div class="input-row"><input type="text" class="b-lat" placeholder="Lat (Opt)" value="-23.55"><input type="text" class="b-long" placeholder="Long (Opt)" value="-46.63"></div>
          </div>
          <div class="city-item"><input type="text" class="b-name" placeholder="City Name" value="New York"><div class="input-row"><input type="text" class="b-lat" placeholder="Lat (Opt)"><input type="text" class="b-long" placeholder="Long (Opt)"></div></div>
        </div>
        <button onclick="addCityRow()" style="background: var(--secondary); margin-bottom: 10px;">+ Add City</button>
        <button onclick="fetchBulk()">Fetch Concurrently</button>
        <div id="bulk-results"></div>
      </div>
    </div>

    <div class="history-btn" onclick="openHistory()">📜 View History</div>

    <!-- History Modal -->
    <div id="history-modal" class="modal-overlay">
      <div class="modal-content">
        <div class="modal-header">
          <h3>Search History</h3>
          <span class="close-modal" onclick="closeHistory()">&times;</span>
        </div>
        <button onclick="limparHistorico()" style="background: var(--error); margin-bottom: 20px; font-size: 14px; padding: 8px;">🗑️ Clear All Records</button>
        <div id="lista-historico"></div>
      </div>
    </div>

    <script>
      let map, marker;

      function createWeatherCard(name, temp, lat, long, isDay, error) {
        if (error) return `<div class="weather-result error"><strong>${name}</strong>: ${error}</div>`;
        const statusClass = isDay === 1 ? 'status-day' : 'status-night';
        const statusLabel = isDay === 1 ? '☀️ Day' : '🌙 Night';
        return `
          <div class="weather-result">
            <div class="weather-info">
              <strong>${name || 'Result'}</strong>
              <span>${temp}°C</span>
              <br><small>${lat}, ${long}</small>
            </div>
            <div class="status-badge ${statusClass}">${statusLabel}</div>
          </div>
        `;
      }

      function switchTab(type) {
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        document.getElementById('single-section').classList.add('hidden');
        document.getElementById('bulk-section').classList.add('hidden');
        if (type === 'single') {
          document.querySelectorAll('.tab')[0].classList.add('active');
          document.getElementById('single-section').classList.remove('hidden');
          if (map) setTimeout(() => map.invalidateSize(), 100);
        } else {
          document.querySelectorAll('.tab')[1].classList.add('active');
          document.getElementById('bulk-section').classList.remove('hidden');
        }
      }

      function openHistory() {
        document.getElementById('history-modal').classList.add('show');
        carregarHistorico();
      }
      function closeHistory() { document.getElementById('history-modal').classList.remove('show'); }

      function addCityRow() {
        const div = document.createElement('div');
        div.className = 'city-item';
        div.innerHTML = `<input type="text" class="b-name" placeholder="City Name"><div class="input-row"><input type="text" class="b-lat" placeholder="Lat (Opt)"><input type="text" class="b-long" placeholder="Long (Opt)"></div>`;
        document.getElementById('bulk-list').appendChild(div);
      }

      async function buscarClima() {
        const name = document.getElementById('s-name').value;
        const lat = document.getElementById('lat').value;
        const long = document.getElementById('long').value;
        const resDiv = document.getElementById('resultado');
        resDiv.innerHTML = "Fetching...";
        try {
          const response = await fetch(`/weather?name=${encodeURIComponent(name)}&lat=${lat}&long=${long}`);
          if (!response.ok) throw new Error(await response.text());
          const d = await response.json();
          resDiv.innerHTML = createWeatherCard(name || "Search Result", d.current_weather.temperature, d.latitude, d.longitude, d.current_weather.is_day);
          if (!map) initMap();
          map.setView([d.latitude, d.longitude], 10);
          if (marker) map.removeLayer(marker);
          marker = L.marker([d.latitude, d.longitude]).addTo(map);
        } catch (e) { resDiv.innerHTML = `<div class='weather-result error'>${e.message}</div>`; }
      }

      async function fetchBulk() {
        const rows = document.querySelectorAll('.city-item');
        const cities = Array.from(rows).map(r => ({ name: r.querySelector('.b-name').value, lat: r.querySelector('.b-lat').value, long: r.querySelector('.b-long').value })).filter(c => c.name || (c.lat && c.long));
        const resDiv = document.getElementById('bulk-results');
        resDiv.innerHTML = "Fetching...";
        try {
          const response = await fetch('/bulk', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(cities) });
          const data = await response.json();
          resDiv.innerHTML = "";
          data.forEach(res => {
            if (res.error) resDiv.innerHTML += createWeatherCard(res.name, null, null, null, null, res.error);
            else resDiv.innerHTML += createWeatherCard(res.name, res.weather.current_weather.temperature, res.weather.latitude, res.weather.longitude, res.weather.current_weather.is_day);
          });
        } catch (e) { resDiv.innerHTML = "Error: " + e.message; }
      }

      async function carregarHistorico() {
        const response = await fetch("/history");
        const data = await response.json();
        const div = document.getElementById("lista-historico");
        div.innerHTML = data.length ? "" : "<p>No history yet.</p>";
        data.forEach(item => {
          div.innerHTML += createWeatherCard(item.name, item.temperature, item.latitude.toFixed(2), item.longitude.toFixed(2), item.is_day);
        });
      }

      async function limparHistorico() {
        if (confirm("Delete all history?")) {
          await fetch("/history/clear", { method: "DELETE" });
          carregarHistorico();
        }
      }

      function initMap() {
        map = L.map('map').setView([0, 0], 2);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
      }
      window.onload = () => { initMap(); };
    </script>
  </body>
</html>
